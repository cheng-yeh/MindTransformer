        n_dims: 300
        seed: 1

# Experiment configuration
experiment:
  language: "en"
  roi: "all"
  seed: 1234
  model_seed: 0
  cpu_offload: false
  cross_validation: 5
  device: "cuda"
  activation_mode:
    - 'input_hidden_state'
    - 'pre_attn_norm'
    - 'per_head_q'
    - 'per_head_q_rope'
    - 'per_head_k'
    - 'per_head_k_rope'
    - 'per_head_v'
    - 'per_head_context_vector'
    - 'attn_output'
    - 'post_attn_hidden_state'
    - 'pre_ffn_norm'
    - 'ffn_activated_state'
    - 'ffn_output'
  run_baselines: true
  save_intermediate: true
  plot_results: true
  plot_masks: true
  plot_roi: true
  show_plots: false
  verbose: true

# Text processing configuration
text_processing:
  # CHANGED: Replaced hardcoded password
  text_archive_password: "<INSERT_TEXT_ARCHIVE_PASSWORD>"
  text_zip: "lpp_${experiment.language}_text.zip"
  punctuation:
    standard: ['-', "'", "’", "“", '«', '»', '—']
    chinese: ['，', '《', '》', '。', '：', '“', '”', '；', '？', '！', '…', '、']
  word_match_attempts: 200
  chinese_processing:
    enabled: true
   
  # --- NEW SECTION ---
  processing:
    batch_size: 1
    max_tokens: 2048
